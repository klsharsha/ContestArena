server:
  port: 8082

spring:
  application:
    name: contest-service
  
  cloud:
    inetutils:
      # 1. Ignore virtual WSL/Docker adapters that cause 500 errors
      ignored-interfaces:
        - eth.*
        - vEthernet.*
      # 2. Force Spring to pick your actual Home/Office Wi-Fi or LAN IP
      preferred-networks:
        - 192.168
      use-only-site-local-interfaces: true

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/contest_db?serverTimezone=Asia/Kolkata
    username: postgres
    password: your_password
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

# ===============================
# EUREKA & LOAD BALANCING
# ===============================
eureka:
  instance:
    # Tells Gateway: "Route to my IP, not my hostname"
    prefer-ip-address: true
    # Dynamically generates an ID using the REAL IP found by inetutils
    instance-id: ${spring.application.name}:${server.port}:${spring.cloud.client.ip-address}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

# ===============================
# LOGGING
# ===============================
logging:
  level:
    org.hibernate.SQL: DEBUG
    com.contest_manager.contest_service: INFO