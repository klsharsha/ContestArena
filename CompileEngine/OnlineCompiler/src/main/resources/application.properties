# ===============================
# SERVER & SERVICE IDENTITY
# ===============================
server.port=8084
spring.application.name=execution-service

# ===============================
# DYNAMIC IP FIX (The "NXDOMAIN" Killer)
# ===============================
# This forces the service to ignore virtual WSL/Docker adapters 
# and find your real network IP so the Gateway can find it.
spring.cloud.inetutils.ignored-interfaces=eth.*,vEthernet.*
spring.cloud.inetutils.preferred-networks=172.24,192.168
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}:${spring.cloud.client.ip-address}
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ===============================
# DATABASE (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/execution_db?serverTimezone=UTC
spring.datasource.username=postgres
spring.datasource.password=your_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# RABBITMQ (For Code Submission Queuing)
# ===============================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
rabbitmq.queue.name=execution-queue

# ===============================
# KAFKA (For Real-time Results)
# ===============================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=execution-group
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Custom Kafka Topics
kafka.topic.result=submission-result
kafka.topic.submission=submission-topic

# Contest Service endpoint (used to sync problem test cases on-demand)
contest.service.base-url=http://localhost:8082

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.netflix.discovery=INFO
# Tell Kafka to use the JsonDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# Trust your package so it allows the conversion
spring.kafka.consumer.properties.spring.json.trusted.packages=com.compiler.dto,com.compiler.model