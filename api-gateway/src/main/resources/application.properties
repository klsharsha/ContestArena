# ===============================
# SERVER & SERVICE IDENTITY
# ===============================
server.port=8080
spring.application.name=api-gateway

# ===============================
# SERVICE DISCOVERY (Eureka)
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}:${spring.cloud.client.ip-address}

# ===============================
# ROUTES CONFIGURATION
# ===============================

# --- [0] Auth Service ---
# Call: http://localhost:8080/api/auth/register
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**
# StripPrefix=2 removes "/api" and "/auth"
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=2

# --- [1] Contest Service ---
spring.cloud.gateway.server.webflux.routes[1].id=contest-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://contest-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/contests/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=1

# --- [2] Leaderboard Service ---
spring.cloud.gateway.server.webflux.routes[2].id=leaderboard-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://leaderboard-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/leaderboard/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=StripPrefix=1

# --- [3] Execution Service ---
spring.cloud.gateway.server.webflux.routes[3].id=execution-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://execution-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/execute/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=StripPrefix=1

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.cloud.gateway=TRACE